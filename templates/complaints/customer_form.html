{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
	<div class="col-md-8">
		<div class="card shadow-sm">
			<div class="card-body">
				<h2 class="mb-3">Submit Complaint</h2>
				<form method="post">
					{% csrf_token %}
					{{ form.as_p }}
					<button class="btn btn-primary">Submit</button>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 | {{ APP_NAME|default:"Telecom Customer Portal" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/theme.css' %}" rel="stylesheet">
</head>
<body>
    <div class="error-page">
        <div class="error-card">
            <div class="error-badge">{{ APP_NAME|default:"Telecom Customer Portal" }}</div>
            <div class="error-code">500</div>
            <h1 class="error-title">Something went wrong</h1>
            <p class="error-message">
                An unexpected server error occurred. Please try again in a few moments.
            </p>

            <div class="error-actions">
                <a href="/" class="error-btn error-btn-primary">Go Home</a>
                <a href="javascript:location.reload()" class="error-btn error-btn-secondary">Try Again</a>
            </div>

            <div class="error-help">
                If the issue continues, please contact support.
            </div>
        </div>
    </div>
</body>
</html>

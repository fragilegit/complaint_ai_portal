{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 | {{ APP_NAME|default:"Telecom Customer Portal" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/theme.css' %}" rel="stylesheet">
</head>
<body>
    <div class="error-page">
        <div class="error-card">
            <div class="error-badge">{{ APP_NAME|default:"Telecom Customer Portal" }}</div>
            <div class="error-code">403</div>
            <h1 class="error-title">Access denied</h1>
            <p class="error-message">
                You do not have permission to access this page or perform this action.
            </p>

            <div class="error-actions">
                <a href="/" class="error-btn error-btn-primary">Go Home</a>
                <a href="javascript:history.back()" class="error-btn error-btn-secondary">Go Back</a>
            </div>

            <div class="error-help">
                Contact an administrator if you believe this is an error.
            </div>
        </div>
    </div>
</body>
</html>

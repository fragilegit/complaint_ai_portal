<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Complaint AI Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Complaint AI Portal</a>
            <div class="d-flex gap-2 align-items-center text-white">
                {% if request.user.is_authenticated %}
                <span>{{ request.user.username }} ({{ request.user.role }})</span>
                <a class="btn btn-sm btn-outline-light" href="{% url 'logout' %}">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container pb-5">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
    </main>
</body>

</html>
